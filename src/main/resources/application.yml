spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bmsaug23?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto:update
    show-sql: true
  #spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL57Dialect
  #spring.jpa.database-platform=org.hibernate.dialect.MySQL57Dialect

bookshow:
  booking:
    seat-hold-duration-minutes: ${BOOKING_SEAT_HOLD_DURATION:5}
    max-seats-per-booking: ${BOOKING_MAX_SEATS:10}
    max-bookings-per-user-per-day: ${BOOKING_MAX_PER_USER_DAY:5}
  payment:
    gateway: ${PAYMENT_GATEWAY:stripe}
    timeout-seconds: ${PAYMENT_TIMEOUT:30}
    retry-attempts: ${PAYMENT_RETRY_ATTEMPTS:3}
    enabled-gateways: ${PAYMENT_ENABLED_GATEWAYS:stripe,razorpay,adyen}
  theatre:
    integration-timeout-ms: ${THEATRE_INTEGRATION_TIMEOUT:10000}
    max-retry-attempts: ${THEATRE_MAX_RETRY:3}
  security:
    jwt-secret: ${JWT_SECRET:bookmyshow-secret-key-for-development-change-in-production}
    jwt-expiration-ms: ${JWT_EXPIRATION:86400000}


